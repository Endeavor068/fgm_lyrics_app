name: fgm_lyrics_app
description: "Full Gospel Mission app for browsing and sharing new hymns lyrics, supporting multiple languages and modern UI."
publish_to: 'none'
version: 0.1.1+2

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  google_fonts: ^8.0.1
  shared_preferences: ^2.5.4
  share_plus: ^12.0.1
  flutter_riverpod: ^3.0.1
  flutter_gutter: ^2.2.0
  audioplayers: ^6.5.1
  flutter_form_builder: ^10.3.0+1
  form_builder_validators: ^11.3.0
  phone_form_field: ^10.0.17
  http: ^1.6.0
  json_annotation: ^4.9.0
  wolt_modal_sheet: ^0.11.0
  confetti: ^0.8.0
  upgrader: ^12.5.0
  

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  custom_lint: ^0.8.0
  riverpod_lint: ^3.0.1
  flutter_launcher_icons: ^0.14.4
  json_serializable: ^6.11.0
  build_runner: ^2.11.0

flutter:
  uses-material-design: true
  assets:
    - assets/

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/logo.png"
  min_sdk_android: 21 # android min sdk min:16, default 21
  remove_alpha_ios: true # Remove alpha channel for iOS App Store compliance
  web:
    generate: true
    image_path: "assets/logo.png"
    background_color: "#0288D1"
    theme_color: "#0288D1"
  windows:
    generate: true
    image_path: "assets/logo.png"
    icon_size: 48 # min:48, max:256, default: 48
  macos:
    generate: true
    image_path: "assets/logo.png"